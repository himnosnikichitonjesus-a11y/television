<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>NikichitonJesús TV</title>
  <meta name="description" content="Reproductor de audio y video — episodios, series y más." />
  <meta property="og:title" content="NikichitonJesús TV" />
  <meta property="og:description" content="Reproductor de audio y video — episodios, series y más." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <!-- Favicon actualizado con la imagen proporcionada -->
  <link rel="icon" type="image/svg+xml" href="https://nikichitonjesus.odoo.com/web/image/1666-b4b0cc47/Logo%201%201.svg" />
  <!-- Estilos generales (se mantiene el enlace a tu styles.css original) -->
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* Ajuste adicional para el logo en el título, sin interferir con tu CSS existente */
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    .brand-logo {
      height: 32px;
      width: auto;
      vertical-align: middle;
      display: inline-block;
    }
    /* Asegurar que el texto del título se mantenga al lado */
    .brand span {
      display: inline-block;
    }
    /* Opcional: si el logo es muy grande en pantallas pequeñas */
    @media (max-width: 640px) {
      .brand-logo {
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <header id="app-header">
    <div class="header-inner">
      <a href="/" data-link class="brand">
        <!-- Logo imagen agregado antes del título -->
        <img class="brand-logo" src="https://nikichitonjesus.odoo.com/web/image/1668-134717bf/Comp%20Logo%20con%20fondo.svg" alt="Logo NikichitonJesús" />
        Kristo<span>Videos</span>
      </a>
      <nav class="main-nav">
        <a href="/" data-link>Inicio</a>
        <a href="/novedades" data-link>Novedades</a>
        <a href="/biblioteca" data-link>Biblioteca</a>
        <a href="/usuario" data-link>Mi cuenta</a>
      </nav>
      <div class="search-box">
        <input id="global-search" type="search" placeholder="Buscar episodios, series, autores…" />
      </div>
    </div>
    <div id="categories-bar" class="categories-bar"></div>
  </header>

  <main id="app-container" class="app-container"><!-- main.js inyecta aquí --></main>

  <!-- Reproductor PIP persistente (contenido inyectado por main.js) -->
  <div id="pip-player" class="pip-player hidden"></div>

  <script type="module" src="/main.js"></script>
</body>
</html>
